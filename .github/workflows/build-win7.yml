name: Build Win7 Compatible CPU

on:
  workflow_dispatch:
    inputs:
      ssh:
        description: SSH for debugging
        required: false
        default: "false"

jobs:
  build:
    runs-on: windows-2019
    steps:
    - uses: actions/checkout@v4
    - name: Read VERSION
      id: version
      run: |
        VERSION=$(sed -n 's/^VERSION = "\(.*\)"/\1/p' backend/config.py)
        echo "VERSION=$VERSION" >> $GITHUB_ENV
        echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
      shell: bash
    - uses: actions/setup-python@v5
      with:
        python-version: "3.9"
        cache: "pip"
    - name: Install Win7-compatible dependencies
      shell: bash
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install paddlepaddle==2.6.2 -i https://www.paddlepaddle.org.cn/packages/stable/cpu/
        cat > requirements-win7.txt << 'REOF'
        opencv-python==4.8.1.78
        Levenshtein==0.26.0
        pillow==10.4.0
        tqdm==4.67.1
        pysrt==1.1.2
        wordsegment==1.3.1
        scikit-image==0.22.0
        lmdb==1.4.1
        pyclipper==1.3.0.post5
        PySide6==6.5.3
        pyside6-fluent-widgets==1.5.5
        numpy==1.26.4
        shapely==2.0.4
        six==1.16.0
        setuptools==69.5.1
        paddleocr==2.7.3
        imageio-ffmpeg==0.4.9
        REOF
        pip install -r requirements-win7.txt
        pip freeze > requirements-win7-frozen.txt
    - run: pip install QPT==1.0b8
    - name: Get site-packages path
      shell: bash
      run: |
        SITE_PACKAGES=$(python -c "import site, os; print(os.path.join(site.getsitepackages()[0], 'Lib', 'site-packages'))")
        SITE_PACKAGES_UNIX=$(cygpath -u "$SITE_PACKAGES")
        echo "SITE_PACKAGES_UNIX=$SITE_PACKAGES_UNIX" >> $GITHUB_ENV
        echo "SITE_PACKAGES=$SITE_PACKAGES" >> $GITHUB_ENV
    - name: Fix QPT internal error
      run: sed -i '98c\        try:\n            dep = pkg.requires()\n        except TypeError:\n            continue' ${SITE_PACKAGES_UNIX}/qpt/kernel/qpackage.py
      shell: bash
    - name: Start SSH via tmate
      if: github.event.inputs.ssh == 'true'
      uses: mxschmitt/action-tmate@v3
    - name: Build with QPT Win7
      run: |
        cp requirements.txt requirements.txt.bak
        cp requirements-win7-frozen.txt requirements.txt
        python backend/tools/makedist.py
        mv ../vse_out ./vse_out
        cp ./vse_out/Debug/Debug-*.cmd ./vse_out/Release/ 2>/dev/null || true
        mv requirements.txt.bak requirements.txt
      env:
        QPT_Action: "True"
      shell: bash
    - name: Upload Release folder
      uses: actions/upload-artifact@v4
      with:
        name: vse-v${{ env.VERSION }}-win7-cpu-release
        path: vse_out/Release/
    - name: Package Release as 7z
      run: |
        cd vse_out/Release
        7z a -t7z -mx=9 -m0=LZMA2 -ms=on -mfb=64 -md=32m -mmt=on -v1888m vse-v${{ env.VERSION }}-win7-cpu.7z *
        if [ -f vse-v${{ env.VERSION }}-win7-cpu.7z.001 ] && [ ! -f vse-v${{ env.VERSION }}-win7-cpu.7z.002 ]; then
          mv vse-v${{ env.VERSION }}-win7-cpu.7z.001 vse-v${{ env.VERSION }}-win7-cpu.7z
        fi
      shell: bash
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        prerelease: true
        tag_name: "v${{ env.VERSION }}-win7"
        target_commitish: ${{ github.sha }}
        name: "VSE ${{ env.VERSION }} Win7 Compatible"
        body: "Video Subtitle Extractor v${{ env.VERSION }} Win7 Compatible Build. Extract with 7-Zip and run VideoSubtitleExtractor.exe. No installation needed."
        files: "vse_out/Release/vse-v${{ env.VERSION }}-win7-cpu.7z*"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
