name: Build Win7 EXE

on:
  workflow_dispatch:

permissions:
  contents: write
  packages: read

env:
  PY_VER: "3.9.13"
  PYEXE: "C:/Python39/python.exe"

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Read VERSION
        id: version
        run: |
          VERSION=$(sed -n 's/^VERSION = "\(.*\)"/\1/p' backend/config.py)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Install Wine and tools
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update -qq
          sudo apt-get install -y -qq wine64 xvfb p7zip-full wget ca-certificates

      - name: Init Wine and install Python 3.9
        run: |
          export WINEARCH=win64
          export WINEDEBUG=-all
          xvfb-run -a wine wineboot --init
          sleep 10
          wget -q "https://www.python.org/ftp/python/${PY_VER}/python-${PY_VER}-amd64.exe" -O python-installer.exe
          xvfb-run -a wine python-installer.exe /passive InstallAllUsers=0 PrependPath=1 Include_pip=1
          echo "Verifying..."
          xvfb-run -a wine C:/Python39/python.exe --version
          xvfb-run -a wine C:/Python39/python.exe -m pip --version

      - name: Install all dependencies
        run: |
          PIP="xvfb-run -a wine C:/Python39/python.exe -m pip"
          $PIP install --upgrade pip setuptools wheel
          $PIP install paddlepaddle==2.6.2 -i https://www.paddlepaddle.org.cn/packages/stable/cpu/
          $PIP install "paddleocr>=3.0.0,<4.0.0"
          $PIP install PySide6==6.5.3 PySide6-Fluent-Widgets==1.5.5
          $PIP install opencv-python==4.8.1.78 numpy==1.26.4 Pillow==10.4.0 scikit-image==0.22.0 shapely==2.0.4 pyclipper==1.3.0.post5 lmdb
          mkdir -p /home/runner/.wine/drive_c/Python39/Lib/site-packages/lanms
          touch /home/runner/.wine/drive_c/Python39/Lib/site-packages/lanms/__init__.py
          $PIP install Levenshtein==0.26.0 pysrt wordsegment tqdm PyYAML requests loguru imageio-ffmpeg pytz je-showinfilemanager==1.1.6a4
          $PIP install pyinstaller==5.13.2

      - name: Pre-download OCR models
        run: xvfb-run -a wine C:/Python39/python.exe -c "from paddleocr import PaddleOCR; ocr = PaddleOCR(use_angle_cls=True, lang='ch', use_gpu=False); print('Models ready')"

      - name: Build EXE
        run: xvfb-run -a wine C:/Python39/python.exe -m PyInstaller vse-win7.spec --clean --noconfirm

      - name: Package as 7z
        run: |
          cd dist && ls -lh
          7z a -t7z -mx=9 vse-v${{ env.VERSION }}-win7.7z VideoSubtitleExtractor.exe
          ls -lh vse-v${{ env.VERSION }}-win7.7z

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vse-v${{ env.VERSION }}-win7
          path: dist/vse-v${{ env.VERSION }}-win7.7z
          retention-days: 7

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ env.VERSION }}-win7"
          name: "VSE ${{ env.VERSION }} Win7"
          body: "Single EXE, no install needed, Win7 SP1/8/10/11 compatible."
          files: dist/vse-v${{ env.VERSION }}-win7.7z
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
