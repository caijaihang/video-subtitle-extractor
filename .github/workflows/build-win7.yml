name: Build Win7 EXE

on:
  workflow_dispatch:
    inputs:
      ssh:
        description: SSH for debugging
        required: false
        default: "false"

permissions:
  contents: write
  packages: read

env:
  PY_VER: "3.9.13"

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Read VERSION
        id: version
        run: |
          VERSION=$(sed -n 's/^VERSION = "\(.*\)"/\1/p' backend/config.py)
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Install Wine and tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq wine64 xvfb p7zip-full wget
          wine --version

      - name: Initialize Wine prefix
        run: |
          export WINEARCH=win64
          export WINEDEBUG=-all
          xvfb-run -a wine wineboot --init
          sleep 10

      - name: Download and extract embeddable Python 3.9
        run: |
          wget --show-progress -O python-embed.zip \
            "https://www.python.org/ftp/python/${PY_VER}/python-${PY_VER}-embed-amd64.zip"
          ls -la python-embed.zip
          mkdir -p ~/.wine/drive_c/python39
          unzip -q python-embed.zip -d ~/.wine/drive_c/python39
          ls -la ~/.wine/drive_c/python39/

      - name: Enable pip for embeddable Python
        run: |
          PTH_FILE=$(ls ~/.wine/drive_c/python39/*._pth | head -1)
          sed -i 's/^#import site/import site/' "$PTH_FILE"
          cat "$PTH_FILE"

      - name: Install pip
        run: |
          wget -q "https://bootstrap.pypa.io/pip/3.9/get-pip.py" \
            -O ~/.wine/drive_c/python39/get-pip.py
          xvfb-run -a wine C:\\python39\\python.exe C:\\python39\\get-pip.py
          xvfb-run -a wine C:\\python39\\python.exe -m pip --version

      - name: Install PaddlePaddle CPU (Win7 compatible)
        run: |
          xvfb-run -a wine C:\\python39\\python.exe -m pip install --upgrade pip
          xvfb-run -a wine C:\\python39\\python.exe -m pip install \
            paddlepaddle==2.6.2 \
            -i https://www.paddlepaddle.org.cn/packages/stable/cpu/

      - name: Install project dependencies
        run: |
          xvfb-run -a wine C:\\python39\\python.exe -m pip install \
            paddleocr>=3.0.0 \
            PySide6==6.5.3 \
            pyside6-fluent-widgets==1.5.5 \
            qframelesswindow>=0.3.8 \
            opencv-python==4.8.1.78 \
            numpy==1.26.4 \
            Pillow==10.4.0 \
            scikit-image==0.22.0 \
            lmdb==1.4.1 \
            shapely==2.0.4 \
            pyclipper==1.3.0.post5 \
            lanms-neo==1.0.3 \
            Levenshtein==0.26.0 \
            pysrt==1.1.2 \
            wordsegment==1.3.1 \
            tqdm==4.67.1 \
            PyYAML==6.0.1 \
            requests==2.31.0 \
            loguru==0.7.2 \
            je-showinfilemanager==1.1.6a4 \
            imageio-ffmpeg==0.4.9 \
            pytz
          echo "All dependencies installed"

      - name: Install PyInstaller
        run: |
          xvfb-run -a wine C:\\python39\\python.exe -m pip install pyinstaller==5.13.2
          xvfb-run -a wine C:\\python39\\python.exe -m PyInstaller --version

      - name: Pre-download OCR models
        run: |
          xvfb-run -a wine C:\\python39\\python.exe -c \
            "from paddleocr import PaddleOCR; ocr = PaddleOCR(use_angle_cls=True, lang='ch', use_gpu=False); print('OK')"

      - name: Build EXE with PyInstaller
        run: |
          xvfb-run -a wine C:\\python39\\python.exe -m PyInstaller \
            vse-win7.spec --clean --noconfirm
          ls -lh dist/

      - name: Package as 7z
        run: |
          cd dist
          if [ -f "VideoSubtitleExtractor.exe" ]; then
            7z a -t7z -mx=9 -m0=LZMA2 \
              vse-v${{ env.VERSION }}-win7.7z VideoSubtitleExtractor.exe
            ls -lh vse-v${{ env.VERSION }}-win7.7z
          else
            echo "ERROR: EXE not found!"
            ls -la dist/ || true
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vse-v${{ env.VERSION }}-win7
          path: dist/vse-v${{ env.VERSION }}-win7.7z
          retention-days: 7

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ env.VERSION }}-win7"
          name: "VSE ${{ env.VERSION }} Win7 Compatible"
          body: "Video Subtitle Extractor v${{ env.VERSION }} - Win7 Compatible. Single EXE, no installation needed. Built with Ubuntu+Wine+Python3.9 embeddable+PyInstaller."
          files: dist/vse-v${{ env.VERSION }}-win7.7z
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "## Build Complete v${{ env.VERSION }}-win7" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Python | ${{ env.PY_VER }} embeddable |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | Ubuntu 24.04 + Wine + PyInstaller 5.13.2 |" >> $GITHUB_STEP_SUMMARY
          echo "| Output | Single EXE (Win7 compatible) |" >> $GITHUB_STEP_SUMMARY
          echo "| Download | Releases or Artifacts |" >> $GITHUB_STEP_SUMMARY
