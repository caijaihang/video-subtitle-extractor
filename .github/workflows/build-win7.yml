name: Build Win7 EXE

on:
  workflow_dispatch:

permissions:
  contents: write
  packages: read

env:
  PY_VER: "3.9.13"

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Read VERSION
        id: version
        run: |
          VERSION=$(sed -n 's/^VERSION = "\(.*\)"/\1/p' backend/config.py)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Setup Wine, Python, deps, build, package
        run: |
          set -e

          WINEPREFIX=/home/runner/.wine
          WINEDIR=$WINEPREFIX/drive_c
          PYDIR=$WINEDIR/python39

          # === Install Wine ===
          sudo dpkg --add-architecture i386
          sudo apt-get update -qq
          sudo apt-get install -y -qq wine64 xvfb p7zip-full wget ca-certificates

          # === Init Wine ===
          export WINEARCH=win64
          export WINEDEBUG=-all
          export WINEPREFIX
          xvfb-run -a wine wineboot --init
          sleep 15

          # === Embeddable Python ===
          wget -q "https://www.python.org/ftp/python/${PY_VER}/python-${PY_VER}-embed-amd64.zip" -O /tmp/pyembed.zip
          mkdir -p "$PYDIR"
          unzip -q /tmp/pyembed.zip -d "$PYDIR"

          # Fix ._pth to enable site-packages
          PTH=$(ls "$PYDIR"/*._pth | head -1)
          sed -i 's/^#import site/import site/' "$PTH"
          echo "Lib/site-packages" >> "$PTH"

          # === Install pip (copy to Wine C: first) ===
          wget -q "https://bootstrap.pypa.io/pip/3.9/get-pip.py" -O "$PYDIR/get-pip.py"
          xvfb-run -a wine C:/python39/python.exe C:/python39/get-pip.py

          # Verify pip works
          xvfb-run -a wine C:/python39/python.exe -m pip --version

          # === Install all dependencies ===
          PIP="xvfb-run -a wine C:/python39/python.exe -m pip"
          $PIP install --upgrade pip setuptools wheel

          $PIP install paddlepaddle==2.6.2 -i https://www.paddlepaddle.org.cn/packages/stable/cpu/
          $PIP install "paddleocr>=3.0.0,<4.0.0"
          $PIP install PySide6==6.5.3 PySide6-Fluent-Widgets==1.5.5
          $PIP install opencv-python==4.8.1.78 numpy==1.26.4 Pillow==10.4.0 scikit-image==0.22.0 shapely==2.0.4 pyclipper==1.3.0.post5 lmdb

          # Mock lanms-neo
          mkdir -p "$PYDIR/Lib/site-packages/lanms"
          touch "$PYDIR/Lib/site-packages/lanms/__init__.py"

          $PIP install Levenshtein==0.26.0 pysrt wordsegment tqdm PyYAML requests loguru imageio-ffmpeg pytz je-showinfilemanager==1.1.6a4
          $PIP install pyinstaller==5.13.2

          # === Pre-download OCR models ===
          xvfb-run -a wine C:/python39/python.exe -c "from paddleocr import PaddleOCR; ocr = PaddleOCR(lang='ch'); print('Models ready')"

          # === Build EXE ===
          xvfb-run -a wine C:/python39/python.exe -m PyInstaller vse-win7.spec --clean --noconfirm
          ls -lh dist/

          # === Package ===
          cd dist
          7z a -t7z -mx=9 vse-v${{ env.VERSION }}-win7.7z VideoSubtitleExtractor.exe
          ls -lh vse-v${{ env.VERSION }}-win7.7z

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vse-v${{ env.VERSION }}-win7
          path: dist/vse-v${{ env.VERSION }}-win7.7z
          retention-days: 7

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ env.VERSION }}-win7"
          name: "VSE ${{ env.VERSION }} Win7"
          body: "Single EXE, no install needed, Win7 SP1/8/10/11 compatible."
          files: dist/vse-v${{ env.VERSION }}-win7.7z
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
