name: Build Win7 EXE

on:
  workflow_dispatch:

permissions:
  contents: write
  packages: read

env:
  PY_VER: "3.10.11"

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Read VERSION
        id: version
        run: |
          VERSION=$(sed -n 's/^VERSION = "\(.*\)"/\1/p' backend/config.py)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Build EXE (single step)
        run: |
          set -e

          WINEPREFIX=/home/runner/.wine
          WINEDIR=$WINEPREFIX/drive_c
          PYDIR=$WINEDIR/python310
          PYEXE="C:/python310/python.exe"

          # === Install Wine ===
          sudo dpkg --add-architecture i386
          sudo apt-get update -qq
          sudo apt-get install -y -qq wine64 xvfb p7zip-full wget ca-certificates

          # === Init Wine ===
          export WINEARCH=win64
          export WINEDEBUG=-all
          export WINEPREFIX
          xvfb-run -a wine wineboot --init
          sleep 15

          # === Python 3.10 embeddable ===
          wget -q "https://www.python.org/ftp/python/${PY_VER}/python-${PY_VER}-embed-amd64.zip" -O /tmp/pyembed.zip
          mkdir -p "$PYDIR"
          unzip -q /tmp/pyembed.zip -d "$PYDIR"

          # Enable site-packages
          PTH=$(ls "$PYDIR"/*._pth | head -1)
          sed -i 's/^#import site/import site/' "$PTH"
          echo "Lib/site-packages" >> "$PTH"

          # Install pip into Wine C: drive
          wget -q "https://bootstrap.pypa.io/pip/3.10/get-pip.py" -O "$PYDIR/get-pip.py"
          xvfb-run -a wine $PYEXE C:/python310/get-pip.py
          xvfb-run -a wine $PYEXE -m pip --version

          # === Install dependencies ===
          PIP="xvfb-run -a wine $PYEXE -m pip"
          $PIP install --upgrade pip setuptools wheel

          # PaddlePaddle 3.0.0 CPU (compatible with PaddleOCR 3.4)
          $PIP install paddlepaddle==3.0.0 -i https://www.paddlepaddle.org.cn/packages/stable/cpu/
          echo "=== PaddlePaddle done ==="

          # PaddleOCR 3.4
          $PIP install "paddleocr>=3.4.0,<4.0.0"
          echo "=== PaddleOCR done ==="

          # PySide6 6.5.3 (Win7 compatible)
          $PIP install PySide6==6.5.3 PySide6-Fluent-Widgets==1.5.5
          echo "=== PySide6 done ==="

          # CV and data libs
          $PIP install opencv-python numpy Pillow scikit-image shapely pyclipper lmdb
          echo "=== CV libs done ==="

          # Mock lanms-neo (VSE code never imports it)
          mkdir -p "$PYDIR/Lib/site-packages/lanms"
          touch "$PYDIR/Lib/site-packages/lanms/__init__.py"

          # Util libs
          $PIP install Levenshtein==0.26.0 pysrt wordsegment tqdm PyYAML requests loguru imageio-ffmpeg pytz je-showinfilemanager==1.1.6a4
          echo "=== Utils done ==="

          # PyInstaller
          $PIP install pyinstaller==5.13.2
          echo "=== PyInstaller done ==="

          # Pre-download OCR models
          xvfb-run -a wine $PYEXE -c "from paddleocr import PaddleOCR; ocr = PaddleOCR(lang='ch'); print('Models ready')"
          echo "=== Models done ==="

          # Build EXE
          xvfb-run -a wine $PYEXE -m PyInstaller vse-win7.spec --clean --noconfirm
          echo "=== Build done ==="
          ls -lh dist/

          # Package as 7z
          cd dist
          7z a -t7z -mx=9 vse-v${{ env.VERSION }}-win7.7z VideoSubtitleExtractor.exe
          ls -lh vse-v${{ env.VERSION }}-win7.7z

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vse-v${{ env.VERSION }}-win7
          path: dist/vse-v${{ env.VERSION }}-win7.7z
          retention-days: 7

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ env.VERSION }}-win7"
          name: "VSE ${{ env.VERSION }} Win7"
          body: "Single EXE, no install needed, Win7 SP1/8/10/11 compatible. Built with Python 3.10 + PaddlePaddle 3.0.0 + PaddleOCR 3.4 + PyInstaller via Ubuntu+Wine."
          files: dist/vse-v${{ env.VERSION }}-win7.7z
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
