name: Build Win7 EXE

on:
  workflow_dispatch:

permissions:
  contents: write
  packages: read

jobs:
  build:
    runs-on: windows-2022
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Read VERSION
        id: version
        shell: bash
        run: |
          VERSION=$(sed -n 's/^VERSION = "\(.*\)"/\1/p' backend/config.py)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          architecture: "x64"

      - name: Install all dependencies
        shell: bash
        run: |
          pip install --upgrade pip setuptools wheel

          echo "=== Installing PaddlePaddle 3.0.0 CPU ==="
          pip install paddlepaddle==3.0.0 -i https://www.paddlepaddle.org.cn/packages/stable/cpu/

          echo "=== Installing PaddleOCR 3.4 ==="
          pip install "paddleocr>=3.4.0,<4.0.0"

          echo "=== Installing PySide6 6.5.3 ==="
          pip install PySide6==6.5.3 PySide6-Fluent-Widgets==1.5.5 qframelesswindow

          echo "=== Installing CV libs ==="
          pip install opencv-python numpy Pillow scikit-image shapely pyclipper lmdb

          echo "=== Installing util libs ==="
          pip install Levenshtein==0.26.0 pysrt wordsegment tqdm PyYAML requests loguru imageio-ffmpeg pytz je-showinfilemanager==1.1.6a4 darkdetect chardet

          echo "=== Installing PyInstaller ==="
          pip install pyinstaller==5.13.2

          echo "=== All dependencies installed ==="
          pip freeze

      - name: Build EXE
        shell: cmd
        run: python -m PyInstaller vse-win7.spec --clean --noconfirm

      - name: Package as 7z
        shell: bash
        run: |
          cd dist
          ls -lh
          if [ -f "VideoSubtitleExtractor.exe" ]; then
            7z a -t7z -mx=9 "vse-v${{ env.VERSION }}-win7.7z" VideoSubtitleExtractor.exe
            ls -lh "vse-v${{ env.VERSION }}-win7.7z"
          else
            echo "ERROR: EXE not found in dist/"
            ls -la dist/ 2>/dev/null || echo "dist/ does not exist"
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vse-v${{ env.VERSION }}-win7
          path: dist/vse-v${{ env.VERSION }}-win7.7z
          retention-days: 7

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ env.VERSION }}-win7"
          name: "VSE ${{ env.VERSION }} Win7"
          body: "Single EXE, no install needed. Win7 SP1/8/10/11 (64-bit). Python 3.10 + PaddlePaddle 3.0.0 + PaddleOCR 3.4 + PyInstaller."
          files: dist/vse-v${{ env.VERSION }}-win7.7z
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
