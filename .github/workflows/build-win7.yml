name: Build Win7 EXE

on:
  workflow_dispatch:

permissions:
  contents: write
  packages: read

env:
  PY_VER: "3.9.13"

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Read VERSION
        id: version
        run: |
          VERSION=$(sed -n 's/^VERSION = "\(.*\)"/\1/p' backend/config.py)
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Install Wine 64-bit (skip 32-bit)
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update -qq
          sudo apt-get install -y -qq wine64 xvfb p7zip-full wget
          wine --version

      - name: Initialize Wine prefix
        run: |
          export WINEARCH=win64
          export WINEDEBUG=-all
          xvfb-run -a wine wineboot --init
          sleep 10

      - name: Download embeddable Python 3.9
        run: |
          wget -q "https://www.python.org/ftp/python/${PY_VER}/python-${PY_VER}-embed-amd64.zip" -O python-embed.zip
          mkdir -p ~/.wine/drive_c/python39
          unzip -q python-embed.zip -d ~/.wine/drive_c/python39
          PTH=$(ls ~/.wine/drive_c/python39/*._pth | head -1)
          sed -i 's/^#import site/import site/' "$PTH"
          wget -q "https://bootstrap.pypa.io/pip/3.9/get-pip.py" -O ~/.wine/drive_c/python39/get-pip.py
          xvfb-run -a wine C:\\python39\\python.exe C:\\python39\\get-pip.py

      - name: Install PaddlePaddle
        run: xvfb-run -a wine C:\\python39\\python.exe -m pip install paddlepaddle==2.6.2 -i https://www.paddlepaddle.org.cn/packages/stable/cpu/

      - name: Install PaddleOCR
        run: xvfb-run -a wine C:\\python39\\python.exe -m pip install "paddleocr>=3.0.0,<4.0.0"

      - name: Install PySide6 GUI
        run: xvfb-run -a wine C:\\python39\\python.exe -m pip install PySide6==6.5.3 PySide6-Fluent-Widgets==1.5.5

      - name: Install CV and data libs
        run: xvfb-run -a wine C:\\python39\\python.exe -m pip install opencv-python==4.8.1.78 numpy==1.26.4 Pillow==10.4.0 scikit-image==0.22.0 shapely==2.0.4 pyclipper==1.3.0.post5 lanms-neo lmdb

      - name: Install text and util libs
        run: xvfb-run -a wine C:\\python39\\python.exe -m pip install Levenshtein==0.26.0 pysrt wordsegment tqdm PyYAML requests loguru imageio-ffmpeg pytz je-showinfilemanager==1.1.6a4

      - name: Install PyInstaller
        run: xvfb-run -a wine C:\\python39\\python.exe -m pip install pyinstaller==5.13.2

      - name: Pre-download OCR models
        run: xvfb-run -a wine C:\\python39\\python.exe -c "from paddleocr import PaddleOCR; ocr = PaddleOCR(use_angle_cls=True, lang='ch', use_gpu=False); print('Models ready')"

      - name: Build EXE
        run: xvfb-run -a wine C:\\python39\\python.exe -m PyInstaller vse-win7.spec --clean --noconfirm

      - name: Package and upload
        run: |
          cd dist
          ls -lh
          7z a -t7z -mx=9 vse-v${{ env.VERSION }}-win7.7z VideoSubtitleExtractor.exe
          ls -lh vse-v${{ env.VERSION }}-win7.7z

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vse-v${{ env.VERSION }}-win7
          path: dist/vse-v${{ env.VERSION }}-win7.7z
          retention-days: 7

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ env.VERSION }}-win7"
          name: "VSE ${{ env.VERSION }} Win7"
          body: "Single EXE, no install needed, Win7 compatible. Built with Ubuntu+Wine+Python3.9+PyInstaller."
          files: dist/vse-v${{ env.VERSION }}-win7.7z
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
