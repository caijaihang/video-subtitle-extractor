name: Build Win7 EXE

on:
  workflow_dispatch:

permissions:
  contents: write
  packages: read

jobs:
  build:
    runs-on: windows-2019
    timeout-minutes: 120
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Read VERSION
        id: version
        shell: bash
        run: |
          VERSION=$(sed -n 's/^VERSION = "\(.*\)"/\1/p' backend/config.py)
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Setup Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          architecture: "x64"

      - name: Install PaddlePaddle
        shell: bash
        run: pip install paddlepaddle==2.6.2 -i https://www.paddlepaddle.org.cn/packages/stable/cpu/

      - name: Install PaddleOCR
        shell: bash
        run: pip install "paddleocr>=3.0.0,<4.0.0"

      - name: Install PySide6 GUI
        shell: bash
        run: pip install PySide6==6.5.3 PySide6-Fluent-Widgets==1.5.5

      - name: Install CV and data libs
        shell: bash
        run: pip install opencv-python==4.8.1.78 numpy==1.26.4 Pillow==10.4.0 scikit-image==0.22.0 shapely==2.0.4 pyclipper==1.3.0.post5 lmdb

      - name: Install text and util libs
        shell: bash
        run: pip install Levenshtein==0.26.0 pysrt wordsegment tqdm PyYAML requests loguru imageio-ffmpeg pytz je-showinfilemanager==1.1.6a4

      - name: Install PyInstaller
        shell: bash
        run: pip install pyinstaller==5.13.2

      - name: Pre-download OCR models
        shell: bash
        run: python -c "from paddleocr import PaddleOCR; ocr = PaddleOCR(use_angle_cls=True, lang='ch', use_gpu=False); print('Models ready')"

      - name: Build EXE
        shell: cmd
        run: python -m PyInstaller vse-win7.spec --clean --noconfirm

      - name: Package as 7z
        shell: bash
        run: |
          cd dist
          ls -lh
          7z a -t7z -mx=9 vse-v${{ env.VERSION }}-win7.7z VideoSubtitleExtractor.exe
          ls -lh vse-v${{ env.VERSION }}-win7.7z

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vse-v${{ env.VERSION }}-win7
          path: dist/vse-v${{ env.VERSION }}-win7.7z
          retention-days: 7

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ env.VERSION }}-win7"
          name: "VSE ${{ env.VERSION }} Win7"
          body: "Single EXE, no install needed, Win7 SP1/8/10/11 compatible. Built with Python 3.9 + PaddlePaddle 2.6.2 + PyInstaller on Windows 2019 Runner."
          files: dist/vse-v${{ env.VERSION }}-win7.7z
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
